<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5b6cff">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="英単語">
<link rel="apple-touch-icon" href="icon.svg">
<title>語源で覚える英単語</title>
<style>
  :root{
    --bg:#0f1226; --card:#1b1f3b; --card2:#232850; --accent:#5b6cff;
    --accent2:#8a7bff; --good:#2fd27a; --bad:#ff5b7a; --text:#eef0ff;
    --sub:#9aa0d0; --gold:#ffd45b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:linear-gradient(160deg,#0f1226,#171a38); color:var(--text);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;}
  .app{width:100%; max-width:480px; min-height:100vh; display:flex; flex-direction:column; padding:0 16px 24px;}

  header{padding:14px 4px 6px; display:flex; align-items:center; justify-content:space-between;}
  header h1{font-size:16px; margin:0; letter-spacing:.5px;}
  .stats{display:flex; gap:8px; font-size:13px;}
  .stat{background:var(--card); padding:5px 10px; border-radius:20px; display:flex; gap:5px; align-items:center;}
  .stat b{color:var(--gold);}

  .deckrow{display:flex; align-items:center; gap:8px; margin:4px 4px 6px;}
  .deckrow label{font-size:12px; color:var(--sub);}
  .deckrow select{flex:1; background:var(--card2); color:var(--text); border:1px solid #343a66;
    border-radius:12px; padding:9px 12px; font-size:14px; font-weight:700;}

  .progress{height:6px; background:var(--card); border-radius:6px; overflow:hidden; margin:4px 4px 4px;}
  .progress > div{height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0; transition:width .4s;}
  .counter{font-size:12px; color:var(--sub); text-align:center; margin:6px 0 4px;}

  .stage{flex:1; display:flex; flex-direction:column; justify-content:center; gap:14px; padding:8px 0;}

  .card{background:linear-gradient(165deg,var(--card2),var(--card)); border-radius:24px;
    padding:26px 22px; box-shadow:0 10px 40px rgba(0,0,0,.35); position:relative; overflow:hidden;}
  .card::before{content:""; position:absolute; top:-40px; right:-40px; width:140px; height:140px;
    background:radial-gradient(circle,var(--accent2),transparent 70%); opacity:.22;}
  .rootchip{display:inline-flex; align-items:center; gap:6px; background:rgba(138,123,255,.18);
    color:var(--accent2); padding:5px 12px; border-radius:20px; font-size:13px; font-weight:700; margin-bottom:12px;}
  .word{font-size:38px; font-weight:800; letter-spacing:.5px; line-height:1.1;}
  .kana{font-size:16px; color:var(--sub); margin-top:6px;}
  .kana .ac{color:var(--gold); font-weight:800;}
  .pos{font-size:12px; color:var(--sub); margin-top:2px;}

  .reveal{margin-top:16px; display:none; animation:fade .35s;}
  .reveal.show{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  .meaning{font-size:23px; font-weight:800; color:#fff;}
  .roots{font-size:14px; color:var(--sub); margin-top:10px; line-height:1.5;}
  .note{margin-top:12px; padding:12px 14px; border-radius:14px; font-size:14px; line-height:1.55;}
  .note.med{background:rgba(47,210,122,.12); border-left:3px solid var(--good);}
  .note.daj{background:rgba(255,212,91,.12); border-left:3px solid var(--gold); margin-top:10px;}
  .note .lbl{display:block; font-size:11px; font-weight:800; letter-spacing:1px; margin-bottom:4px; opacity:.85;}
  .note.med .lbl{color:var(--good);} .note.daj .lbl{color:var(--gold);}
  .note .en2{margin-top:7px; padding-top:7px; border-top:1px dashed rgba(255,255,255,.18);
    font-size:13px; font-style:italic; color:#dfe2ff; line-height:1.5;}

  .example{margin-top:14px; padding:12px 14px; border-radius:14px; background:rgba(91,108,255,.14);
    border-left:3px solid var(--accent); font-size:14px; line-height:1.55;}
  .example .lbl{display:block; font-size:11px; font-weight:800; letter-spacing:1px; margin-bottom:4px; color:var(--accent2);}
  .example .en{color:#fff; font-weight:600;}
  .example .en u{text-decoration-color:var(--gold); text-underline-offset:3px;}
  .example .ja{color:var(--sub); margin-top:4px; font-size:13px;}

  .forms{margin-top:14px; padding:12px 14px; border-radius:14px; background:rgba(255,255,255,.05);}
  .forms .lbl{display:block; font-size:11px; font-weight:800; letter-spacing:1px; margin-bottom:8px; color:var(--accent2);}
  .form-row{display:flex; flex-direction:column; gap:2px; padding:7px 0; border-top:1px solid rgba(255,255,255,.07);}
  .form-row:first-of-type{border-top:none;}
  .form-row .fw{font-size:15px; font-weight:700;}
  .form-row .fw .pos{font-size:11px; color:var(--sub); font-weight:500; margin-left:6px;}
  .form-row .fm{font-size:13px; color:#fff;}
  .form-row .fr{font-size:12px; color:var(--gold);}

  .qword{font-size:32px; font-weight:800; text-align:center;}
  .qkana{text-align:center; color:var(--sub); font-size:15px; margin-top:4px;}
  .qask{text-align:center; color:var(--sub); font-size:13px; margin:14px 0 4px;}
  .choices{display:flex; flex-direction:column; gap:10px;}
  .choice{background:var(--card2); border:2px solid transparent; color:var(--text);
    padding:15px 16px; border-radius:16px; font-size:16px; text-align:left; cursor:pointer; transition:.15s;}
  .choice:active{transform:scale(.98);}
  .choice.correct{border-color:var(--good); background:rgba(47,210,122,.18);}
  .choice.wrong{border-color:var(--bad); background:rgba(255,91,122,.18);}
  .choice.dim{opacity:.45;}

  .controls{display:flex; gap:12px; margin-top:6px;}
  button.btn{flex:1; border:none; border-radius:16px; padding:16px; font-size:16px; font-weight:800;
    color:#fff; cursor:pointer; transition:.15s;}
  button.btn:active{transform:scale(.97);}
  .btn.flip{background:var(--accent);} .btn.again{background:var(--bad);}
  .btn.good{background:var(--good);} .btn.ghost{background:var(--card2);}
  .btn.wide{flex:1;}
  .hint{text-align:center; color:var(--sub); font-size:12px; margin-top:10px;}
  .empty{text-align:center; color:var(--sub); padding:50px 20px; font-size:15px; line-height:1.7;}

  .done{text-align:center; padding:40px 10px;}
  .done .big{font-size:54px;} .done h2{font-size:22px; margin:10px 0;} .done p{color:var(--sub); font-size:15px;}

  .tabbar{display:flex; gap:7px; margin-top:14px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
  .tabbar::-webkit-scrollbar{display:none;}
  .tab{flex:1 0 auto; min-width:56px; text-align:center; padding:10px 12px; border-radius:12px; font-size:13px; color:var(--sub);
    background:var(--card); cursor:pointer; white-space:nowrap;}
  .tab.active{color:#fff; background:var(--accent);}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(40px);
    background:var(--card2); padding:12px 20px; border-radius:30px; font-size:14px; opacity:0; transition:.3s; pointer-events:none; box-shadow:0 6px 24px rgba(0,0,0,.4); z-index:9;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .scene{width:100%; height:118px; margin:6px 0 4px; display:block;}
  .scene .ball{animation:throb 1.6s ease-in-out infinite;}
  @keyframes throb{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
  .scene .mv{stroke-dasharray:5 5; animation:dash 1.2s linear infinite;}
  @keyframes dash{to{stroke-dashoffset:-20;}}
  .dirlabel{text-align:center; font-size:13px; color:var(--accent2); font-weight:700; margin-top:-2px;}

  .speaker{display:flex; flex-direction:column; align-items:center; gap:14px; padding:6px 0 14px;}
  .spkbtn{width:120px; height:120px; border-radius:50%; border:none; cursor:pointer;
    background:radial-gradient(circle at 35% 30%,#7a8bff,#5b6cff); color:#fff; font-size:46px;
    box-shadow:0 10px 30px rgba(91,108,255,.45); transition:.15s;}
  .spkbtn:active{transform:scale(.94);}
  .spkbtn.ping{animation:ping .6s;}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(91,108,255,.5);}100%{box-shadow:0 0 0 28px rgba(91,108,255,0);}}
  .spkhint{color:var(--sub); font-size:13px;}
  .replay{background:var(--card2); color:var(--text); border:none; padding:9px 18px; border-radius:20px; font-size:13px; cursor:pointer;}
  .say{display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:50%;
    border:none; background:var(--card2); color:var(--accent2); font-size:15px; cursor:pointer; vertical-align:middle; margin-left:8px; padding:0; flex:none;}
  .say:active{transform:scale(.88);}
  .say.sm{width:25px; height:25px; font-size:12px; margin-left:6px;}
  .say.playing{background:var(--accent); color:#fff;}

  .grow{display:flex; flex-direction:column; align-items:center; text-align:center; padding:8px 0;}
  .grow svg.tree{width:100%; max-width:320px; height:260px;}
  .grow h2{font-size:20px; margin:6px 0 2px;} .grow .lv{color:var(--gold); font-weight:800;}
  .grow .sub{color:var(--sub); font-size:13px; margin:2px 0 12px;}
  .growbar{width:80%; height:10px; background:var(--card); border-radius:8px; overflow:hidden; margin:0 auto;}
  .growbar > div{height:100%; background:linear-gradient(90deg,var(--good),var(--gold)); transition:width .5s;}
  .growstats{display:flex; gap:10px; margin-top:14px; justify-content:center; flex-wrap:wrap;}
  .gchip{background:var(--card); padding:8px 14px; border-radius:14px; font-size:13px;}
  .gchip b{color:var(--gold); font-size:16px;}
  .achtitle{width:100%; text-align:left; margin:22px 4px 10px; font-size:15px; font-weight:800;}
  .achtitle span{float:right; color:var(--gold); font-size:13px;}
  .badges{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; width:100%;}
  .badge{background:var(--card); border-radius:16px; padding:12px 10px; text-align:center; border:1.5px solid transparent;}
  .badge.on{border-color:var(--gold); background:linear-gradient(165deg,rgba(255,212,91,.16),var(--card)); animation:pop .4s;}
  .badge.off{opacity:.55;}
  @keyframes pop{0%{transform:scale(.9);}60%{transform:scale(1.04);}100%{transform:scale(1);}}
  .badge .bi{font-size:30px; line-height:1.1;} .badge.off .bi{filter:grayscale(1);}
  .badge .bn{font-size:13px; font-weight:800; margin-top:4px;} .badge.on .bn{color:var(--gold);}
  .badge .bd{font-size:11px; color:var(--sub); margin-top:2px; line-height:1.35;}

  /* 復習 */
  .rev-hero{text-align:center;}
  .rev-num{font-size:52px; font-weight:800; color:var(--gold); line-height:1.1;}
  .rev-lbl{color:var(--sub); font-size:14px;}
  .recordlist{margin-top:8px;}
  .rec{display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--card); border-radius:12px; margin-bottom:7px;}
  .rec .rw{font-weight:700; flex:1;} .rec .rk{color:var(--sub); font-size:12px;}
  .stars{letter-spacing:1px; font-size:13px;}
  .rec.done{border:1px solid var(--gold);}
  .sectitle{font-size:14px; font-weight:800; margin:18px 4px 8px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🏛️ 語源で覚える英単語</h1>
    <div class="stats">
      <div class="stat">🔥<b id="streak">0</b></div>
      <div class="stat">⭐<b id="xp">0</b></div>
    </div>
  </header>

  <div class="deckrow">
    <label>コース</label>
    <select id="deck"></select>
  </div>
  <div class="deckrow">
    <label>出題順</label>
    <select id="order">
      <option value="weak">🎯 苦手優先（おすすめ）</option>
      <option value="seq">順番どおり</option>
      <option value="shuffle">🔀 シャッフル</option>
    </select>
  </div>

  <div class="progress"><div id="bar"></div></div>
  <div class="counter" id="counter"></div>

  <div class="stage" id="stage"></div>

  <div class="tabbar">
    <div class="tab active" data-mode="flash">📖 暗記</div>
    <div class="tab" data-mode="quiz">✏️ 意味</div>
    <div class="tab" data-mode="root">🧩 語源</div>
    <div class="tab" data-mode="listen">🔊 音声</div>
    <div class="tab" data-mode="review">📅 復習</div>
    <div class="tab" data-mode="grow">🌳 樹</div>
    <div class="tab" data-mode="settings">⚙️ 設定</div>
  </div>
  <div style="text-align:center;font-size:10px;color:var(--sub);margin-top:7px;letter-spacing:.5px">
    収録 <span id="wc">–</span> 語 ・ v<span id="ver">–</span>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ 語源グループ ============ */
const GROUPS={
  ject :{root:"ject",        meaning:"投げる", icon:"🏐", theme:"throw"},
  spect:{root:"spect / spic",meaning:"見る",   icon:"👀", theme:"look"},
  port :{root:"port",        meaning:"運ぶ",   icon:"📦", theme:"carry"},
  tract:{root:"tract",       meaning:"引く",   icon:"🪢", theme:"pull"},
  mit  :{root:"mit / miss",  meaning:"送る",   icon:"✉️", theme:"send"},
  duct :{root:"duc / duct",  meaning:"導く",   icon:"🐤", theme:"lead"},
  script:{root:"scrib / script",meaning:"書く",icon:"✍️", theme:"write"}
};
const DIR={inject:"in",eject:"out",reject:"back",project:"fwd",object:"at",subject:"down",trajectory:"arc",conjecture:"together"};
const DIRLABEL={in:"in- ＝ 中へ投げる",out:"e- ＝ 外へ投げる",back:"re- ＝ 後ろへ投げ返す",fwd:"pro- ＝ 前へ投げる",
  at:"ob- ＝ 向かって投げる",down:"sub- ＝ 下へ投げる",arc:"tra- ＝ 横切って投げる",together:"con- ＝ 共に投げ合う"};
const PORTDIR={import:"in",export:"out",transport:"across",support:"up",report:"back",opportunity:"at",portable:"gen",portion:"gen",porter:"gen"};
const PORTLABEL={in:"im-(in) ＝ 中へ運び込む",out:"ex- ＝ 外へ運び出す",across:"trans- ＝ 越えて運ぶ",
  up:"sup-(sub) ＝ 下から支え運ぶ",back:"re- ＝ 元へ運び戻す",at:"op-(ob) ＝ 港へ向かう（好機）",gen:"port ＝ 運ぶ"};
const TRACTDIR={attract:"to",extract:"out",contract:"together",subtract:"back",distract:"apart",abstract:"out",retract:"back",traction:"to"};
const TRACTLABEL={to:"自分の方へ引き寄せる",out:"外へ引き出す・抜く",together:"一緒に引く→契約/収縮",back:"引き戻す・取り去る",apart:"引き離す",gen:"引く"};
const MITDIR={transmit:"across",emit:"out",submit:"down",admit:"in",omit:"apart",permit:"fwd",dismiss:"apart",mission:"gen"};
const MITLABEL={across:"越えて送る→伝達",out:"外へ送る→放出",down:"下へ送る→提出",in:"中へ送り入れる→受入",apart:"離して送る→省く/退ける",fwd:"通して送る→許可",gen:"送る"};
const DUCTDIR={produce:"fwd",conduct:"together",introduce:"in",reduce:"back",induce:"in",deduce:"down",abduct:"apart",duct:"gen"};
const DUCTLABEL={fwd:"前へ導く→生産",together:"共に導く→指揮/伝導",in:"中へ導く→導入/誘発",back:"戻して導く→減らす",down:"結論へ導く→推論",apart:"引き離して導く→外す",gen:"導く"};
const SCRIPTDIR={describe:"down",prescribe:"fwd",transcribe:"across",subscribe:"down",inscribe:"in",manuscript:"gen"};
const SCRIPTLABEL={down:"詳しく書く→記述",fwd:"前もって書く→処方",across:"書き写す→転写",in:"中に刻む",gen:"書く"};

/* ============ 単語データ ============ */
const A="<b class='ac'>", _="</b>";  // アクセント強調の短縮
const WORDS=[
  /* ---- レベル2：高校・TOEIC基礎 ---- */
  {id:"improve",level:2,tier:"☆",word:"improve",kana:`イン${A}プルー${_}ヴ`,pos:"動詞",meaning:"改善する・上達する",ex:{en:"Exercise can <u>improve</u> your health.",ja:"運動は健康を改善しうる。"},med:"improve symptoms＝症状を改善する。臨床で頻出。"},
  {id:"increase",level:2,tier:"☆",word:"increase",kana:`イン${A}クリー${_}ス`,pos:"動・名",meaning:"増える・増加",roots:"in-(中へ) + crease(crescere＝育つ) → 育って増える",ex:{en:"The dose was <u>increased</u> gradually.",ja:"用量は徐々に増やされた。"},med:"increase the dose＝増量する（↔decrease 減量）。"},
  {id:"decrease",level:2,tier:"・",word:"decrease",kana:`ディ${A}クリー${_}ス`,pos:"動・名",meaning:"減る・減少",ex:{en:"The pain began to <u>decrease</u>.",ja:"痛みが減り始めた。"}},
  {id:"develop",level:2,tier:"☆",word:"develop",kana:`ディ${A}ヴェ${_}ロップ`,pos:"動詞",meaning:"発達する・発症する・開発する",ex:{en:"Symptoms <u>developed</u> slowly.",ja:"症状が徐々に現れた。"},med:"develop a disease＝発症する。病歴聴取の必須表現。"},
  {id:"require",level:2,tier:"☆",word:"require",kana:`リ${A}クワイ${_}ア`,pos:"動詞",meaning:"必要とする・要求する",ex:{en:"This case <u>requires</u> more tests.",ja:"この症例はさらなる検査を要する。"},med:"required dose / required care など必須語。"},
  {id:"include",level:2,tier:"☆",word:"include",kana:`イン${A}クルー${_}ド`,pos:"動詞",meaning:"含む",roots:"in-(中に) + clude(閉じる) → 中に閉じ込める",ex:{en:"The plan <u>includes</u> follow-up.",ja:"その計画は経過観察を含む。"}},
  {id:"consider",level:2,tier:"☆",word:"consider",kana:`コン${A}シ${_}ダー`,pos:"動詞",meaning:"考慮する・みなす",ex:{en:"We should <u>consider</u> surgery.",ja:"手術を考慮すべきだ。"},med:"consider a diagnosis＝診断を考える。鑑別の頻出語。"},
  {id:"condition",level:2,tier:"☆",word:"condition",kana:`コン${A}ディ${_}ション`,pos:"名詞",meaning:"状態・病態・条件",ex:{en:"The patient's <u>condition</u> is stable.",ja:"患者の状態は安定している。"},med:"general condition＝全身状態。pre-existing condition＝既往。"},
  {id:"effect",level:2,tier:"☆",word:"effect",kana:`イ${A}フェ${_}クト`,pos:"名詞",meaning:"効果・影響",roots:"ef-(ex-：外へ) + fect(作る) → 外に作り出された結果",ex:{en:"The drug had a strong <u>effect</u>.",ja:"その薬は強い効果があった。"},med:"side effect＝副作用、adverse effect＝有害事象。"},
  {id:"result",level:2,tier:"・",word:"result",kana:`リ${A}ザ${_}ルト`,pos:"名・動",meaning:"結果・生じる",ex:{en:"The test <u>results</u> were normal.",ja:"検査結果は正常だった。"}},
  {id:"necessary",level:2,tier:"・",word:"necessary",kana:`${A}ネ${_}セサリー`,pos:"形容詞",meaning:"必要な",ex:{en:"Rest is <u>necessary</u> for recovery.",ja:"回復には休養が必要だ。"}},
  {id:"however",level:2,tier:"・",word:"however",kana:`ハウ${A}エ${_}ヴァー`,pos:"副詞",meaning:"しかしながら",ex:{en:"<u>However</u>, the risk still remains.",ja:"しかし、リスクは依然残る。"}},
  {id:"available",level:2,tier:"☆",word:"available",kana:`ア${A}ヴェイ${_}ラブル`,pos:"形容詞",meaning:"利用できる・入手できる",ex:{en:"The vaccine is now <u>available</u>.",ja:"そのワクチンは今や入手可能だ。"},med:"data are available＝データが利用可能。論文頻出。"},
  {id:"benefit",level:2,tier:"☆",word:"benefit",kana:`${A}ベ${_}ネフィット`,pos:"名・動",meaning:"利益・恩恵・利する",roots:"bene-(良い) + fit(なす) → 良いことをなす",ex:{en:"The <u>benefits</u> outweigh the risks.",ja:"利益がリスクを上回る。"},med:"risk-benefit balance＝リスク・ベネフィットの天秤。"},
  {id:"experience",level:2,tier:"・",word:"experience",kana:`イクス${A}ピ${_}アリエンス`,pos:"名・動",meaning:"経験（する）",ex:{en:"He <u>experienced</u> mild pain.",ja:"彼は軽い痛みを経験した。"}},
  {id:"suggest",level:2,tier:"☆",word:"suggest",kana:`サ${A}ジェ${_}スト`,pos:"動詞",meaning:"提案する・示唆する",roots:"sug-(sub-：下から) + gest(運ぶ) → そっと差し出す",ex:{en:"The data <u>suggest</u> a link.",ja:"データは関連を示唆する。"},med:"findings suggest…＝所見は～を示唆する。考察の定番。"},

/* ============ コース（デッキ） ============ */
/* レベル別コース（手動）＋ 語源別コース（GROUPSから自動生成） */
/* 基礎（語源グループ以外のlevel2）を、出現順に100語ずつサブコース化（自動） */
const _basics=WORDS.filter(w=>w.level===2 && !w.group);
const LEVEL_DECKS=[];
for(let k=0; k*100<_basics.length; k++){
  const slice=_basics.slice(k*100,k*100+100);
  const ids=new Set(slice.map(w=>w.id));
  LEVEL_DECKS.push({id:"basic"+k, name:`基礎 ${k*100+1}〜${k*100+slice.length}`, f:(w=>ids.has(w.id))});
}
if(!LEVEL_DECKS.length) LEVEL_DECKS.push({id:"basic0",name:"基礎",f:()=>false});
const GROUP_DECKS=Object.keys(GROUPS).map(gid=>({
  id:gid, name:`${GROUPS[gid].icon} ${GROUPS[gid].root}（${GROUPS[gid].meaning}）`, f:w=>w.group===gid
}));
const DECKS=[...LEVEL_DECKS,...GROUP_DECKS];
let deck=LEVEL_DECKS[0].id;
function pool(){ return WORDS.filter(DECKS.find(d=>d.id===deck).f); }
function byId(id){ return WORDS.find(w=>w.id===id); }

/* ============ 状態（localStorage） ============ */
const ST=JSON.parse(localStorage.getItem("vocab_state")||"{}");
ST.xp=ST.xp||0; ST.streak=ST.streak||0; ST.lastDay=ST.lastDay||null;
ST.mastered=ST.mastered||{}; ST.ach=ST.ach||{};
ST.qStreak=ST.qStreak||0; ST.qBest=ST.qBest||0;
ST.srs=ST.srs||{};   // {id:{box,due,seen,done}}
ST.order=ST.order||"weak";   // 出題順：weak=苦手優先 / seq=順番 / shuffle
function save(){ localStorage.setItem("vocab_state",JSON.stringify(ST)); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function bumpStreak(){ const t=todayStr(); if(ST.lastDay===t)return;
  const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
  ST.streak=(ST.lastDay===y)?ST.streak+1:1; ST.lastDay=t; save(); }
function master(id){ if(!ST.mastered[id]){ ST.mastered[id]=true; save(); } }
function mc(){ return Object.keys(ST.mastered).length; }

/* SRS：正解で間隔を伸ばす */
const SRS_DAYS=[0,1,3,7,16,35];
function srsAnswer(id,ok){
  const s=ST.srs[id]||(ST.srs[id]={box:0,due:0,seen:0,done:0});
  s.seen++;
  s.box = ok ? Math.min(s.box+1,5) : Math.max(s.box-1,0);
  s.due = Date.now()+SRS_DAYS[s.box]*864e5;
  if(s.box>=5 && !s.done){ s.done=Date.now(); }
  save();
}

/* ============ レンダリング ============ */
const $=s=>document.querySelector(s);
const stage=$("#stage");
let mode="flash", i=0, session=[];
/* 苦手優先の並び替え：習熟度(box)が低い順。未学習は中間、覚えた語は後ろ。同点はランダム */
function weakScore(w){ const s=ST.srs[w.id]; return s? s.box : 2.4; }
function orderPool(P){
  if(ST.order==="seq") return P.slice();
  if(ST.order==="shuffle") return shuffle(P);
  return P.map(w=>({w,s:weakScore(w),r:Math.random()})).sort((a,b)=>a.s-b.s||a.r-b.r).map(o=>o.w);
}
function startSession(){ session=orderPool(pool()); i=0; }
function shuffle(a){a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.random()*(k+1)|0;[a[k],a[j]]=[a[j],a[k]];}return a;}
function toast(t){const e=$("#toast");e.textContent=t;e.classList.add("show");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("show"),1500);}

function render(){
  $("#streak").textContent=ST.streak; $("#xp").textContent=ST.xp;
  $("#deck").disabled = (mode==="review"||mode==="grow"||mode==="settings");
  if(mode==="grow"){ bar(0); $("#counter").textContent=""; return renderGrow(); }
  if(mode==="review"){ bar(0); $("#counter").textContent=""; return renderReview(); }
  if(mode==="settings"){ bar(0); $("#counter").textContent=""; return renderSettings(); }
  if(!session.length) startSession();
  const P=session;
  bar(i/P.length*100);
  const g=P[0]&&P[0].group?GROUPS[P[0].group]:null;
  const head=g?`語源 ${g.icon} ${g.root}＝${g.meaning}`:DECKS.find(d=>d.id===deck).name;
  $("#counter").textContent = i<P.length ? `${i+1} / ${P.length}　【${head}】` : "";
  ({flash:renderFlash,quiz:renderQuiz,root:renderRoot,listen:renderListen}[mode])(P);
}
function bar(p){ $("#bar").style.width=p+"%"; }
function speak(text){ try{const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.9;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){} }
/* 読み上げ用：HTMLタグと日本語訳（（…））を除いた英語だけ取り出す */
function ttsClean(s){ return String(s).replace(/<[^>]+>/g,"").split("（")[0].trim(); }
/* 🔊ボタンのHTML。data-sayに読み上げる英文を入れる */
function say(text,sm){ const t=String(text).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
  return `<button class="say${sm?" sm":""}" data-say="${t}" aria-label="読み上げ">🔊</button>`; }
/* カード内の🔊を一括処理（stageは再描画されても本体は残るので委譲で拾う） */
stage.addEventListener("click",e=>{ const b=e.target.closest(".say"); if(!b)return;
  e.preventDefault(); e.stopPropagation();
  speak(b.dataset.say);
  b.classList.add("playing"); setTimeout(()=>b.classList.remove("playing"),700);
});

function groupChip(w){
  const g=w.group?GROUPS[w.group]:null;
  return g?`<span class="rootchip">${g.icon} ${g.root} = ${g.meaning}</span>`
          :`<span class="rootchip">${DECKS.find(d=>d.id===deck).name}</span>`;
}
function revealHTML(w){
  let h=`<div class="meaning">${w.meaning}</div>`;
  if(w.roots) h+=`<div class="roots">🧩 ${w.roots}</div>`;
  if(w.ex) h+=`<div class="example"><span class="lbl">📝 例文</span><div class="en">${w.ex.en}${say(ttsClean(w.ex.en),1)}</div><div class="ja">${w.ex.ja}</div></div>`;
  if(w.forms) h+=`<div class="forms"><span class="lbl">🔤 語尾が変わると（接尾辞）</span>${w.forms.map(f=>`<div class="form-row"><div class="fw">${f.w}<span class="pos">${f.pos}</span></div><div class="fm">${f.mean}</div><div class="fr">${f.rule}</div></div>`).join("")}</div>`;
  if(w.daj) h+=`<div class="note daj"><span class="lbl">😄 ダジャレ</span>${w.daj}${w.dajEn?`<div class="en2">🇬🇧 ${w.dajEn}${say(ttsClean(w.dajEn),1)}</div>`:""}</div>`;
  if(w.med) h+=`<div class="note med"><span class="lbl">🩺 医学ネタ</span>${w.med}${w.medEn?`<div class="en2">🇬🇧 ${w.medEn}${say(ttsClean(w.medEn),1)}</div>`:""}</div>`;
  return h;
}

/* 暗記 */
function renderFlash(P){
  if(i>=P.length) return renderDone("暗記カード1周クリア！");
  const w=P[i], dl=dirLabelFor(w);
  stage.innerHTML=`<div class="card">${groupChip(w)}<div class="word">${w.word}${say(w.word)}</div><div class="kana">${w.kana}</div><div class="pos">${w.pos}</div>
    ${sceneSVG(w)}${dl?`<div class="dirlabel">${dl}</div>`:""}
    <div class="reveal" id="rev">${revealHTML(w)}</div></div>
   <div class="controls" id="ctrl"><button class="btn flip wide" id="flip">タップで意味を見る 👀</button></div>
   <div class="hint">語源やイラストで意味を“推理”してからめくると定着UP</div>`;
  $("#flip").onclick=()=>{ $("#rev").classList.add("show");
    $("#ctrl").innerHTML=`<button class="btn again" id="ng">むずい😣</button><button class="btn good" id="ok">覚えた👍</button>`;
    $("#ok").onclick=()=>{ST.xp+=10;master(w.id);srsAnswer(w.id,true);bumpStreak();save();toast("+10 XP ⭐ 樹に実がなった🍎");checkAch();i++;render();};
    $("#ng").onclick=()=>{ST.xp+=3;srsAnswer(w.id,false);bumpStreak();save();toast("+3 XP（また復習で出るよ）");checkAch();i++;render();};
  };
}

/* 意味クイズ */
function renderQuiz(P){
  if(i>=P.length) return renderDone("クイズ全問終了！");
  const w=P[i];
  stage.innerHTML=`<div class="card">${groupChip(w)}<div class="qword">${w.word}${say(w.word)}</div><div class="qkana">${w.kana}</div>
    <div class="qask">意味はどれ？</div><div class="choices" id="ch">${mkChoices(w,"meaning")}</div></div>`;
  bindChoices(w,()=>i++<P.length&&render());
}
/* 語源クイズ */
function renderRoot(P){
  const RP=P.filter(w=>w.roots);
  if(RP.length===0) return stage.innerHTML=`<div class="empty">このコースには語源クイズ対象の単語がありません。<br>「🧩語源」コースを選ぶと遊べます。</div>`;
  if(i>=RP.length) return renderDone("語源クイズ終了！");
  const w=RP[i], dl=dirLabelFor(w);
  stage.innerHTML=`<div class="card">${groupChip(w)}${sceneSVG(w)}${dl?`<div class="dirlabel">${dl}</div>`:""}
    <div class="qask">この語源が表す単語は？</div><div class="roots" style="text-align:center;margin:0 0 6px">🧩 ${w.roots}</div>
    <div class="choices" id="ch">${mkChoices(w,"word2")}</div></div>`;
  bindChoices(w,()=>{i++;render();});
}
/* リスニング */
function renderListen(P){
  if(i>=P.length) return renderDone("リスニング終了！");
  const w=P[i];
  stage.innerHTML=`<div class="card"><span class="rootchip">🎧 聞こえた単語の意味は？</span>
    <div class="speaker"><button class="spkbtn" id="spk">🔊</button><button class="replay" id="rep">もう一度きく 🔁</button><div class="spkhint" id="hint">タップで再生</div></div>
    <div class="choices" id="ch">${mkChoices(w,"meaning")}</div></div>`;
  const play=()=>{speak(w.word);const b=$("#spk");b.classList.remove("ping");void b.offsetWidth;b.classList.add("ping");};
  $("#spk").onclick=play; $("#rep").onclick=play; setTimeout(play,350);
  bindChoices(w,()=>{i++;render();},()=>{$("#hint").innerHTML=`<b style="color:#fff">${w.word}</b>　${w.kana}`;});
}

/* 選択肢生成：kind=meaning(意味4択) / word2(英単語+意味) */
function mkChoices(w,kind){
  const wrongs=shuffle(WORDS.filter(x=>x.id!==w.id)).slice(0,3);
  const opts=shuffle([w,...wrongs]);
  return opts.map(o=>{
    const ok=o.id===w.id;
    if(kind==="word2") return `<button class="choice" data-ok="${ok}"><b>${o.word}</b> <span style="color:var(--sub);font-size:13px">${o.meaning}</span></button>`;
    return `<button class="choice" data-ok="${ok}">${o.meaning}</button>`;
  }).join("");
}
let answered=false;
function bindChoices(w,after,onReveal){
  answered=false;
  $("#ch").querySelectorAll(".choice").forEach(btn=>{
    btn.onclick=()=>{
      if(answered)return; answered=true;
      const ok=btn.dataset.ok==="true";
      $("#ch").querySelectorAll(".choice").forEach(b=>{ if(b.dataset.ok==="true")b.classList.add("correct"); else b.classList.add("dim"); });
      if(!ok)btn.classList.add("wrong");
      if(onReveal)onReveal();
      bumpStreak(); srsAnswer(w.id,ok);
      if(ok){ST.xp+=15;master(w.id);ST.qStreak++;ST.qBest=Math.max(ST.qBest,ST.qStreak);toast(`正解！ +15 XP ⭐🍎 ${ST.qStreak}連続`);}
      else{ST.xp+=2;ST.qStreak=0;toast("おしい！ +2 XP");}
      save(); checkAch(); $("#streak").textContent=ST.streak; $("#xp").textContent=ST.xp;
      setTimeout(after,1150);
    };
  });
}

function renderDone(msg){
  bar(100);
  stage.innerHTML=`<div class="done"><div class="big">🎉</div><h2>${msg}</h2><p>累計 ⭐${ST.xp} XP ／ 🔥${ST.streak}日連続</p>
   <div class="controls" style="margin-top:20px"><button class="btn ghost wide" id="again">もう1周する 🔄</button></div></div>`;
  $("#again").onclick=()=>{startSession();render();};
}

/* ============ 復習（SRS） ============ */
let RQ=null, ri=0;
function renderReview(){
  if(RQ) return renderReviewCard();
  const due=dueWords(), learned=learnedWords();
  const mastered=learned.filter(w=>ST.srs[w.id].box>=5);
  const stars=b=>"★".repeat(b)+"☆".repeat(5-b);
  const recRows=learned.sort((a,b)=>ST.srs[b.id].box-ST.srs[a.id].box).map(w=>{
    const s=ST.srs[w.id];
    return `<div class="rec ${s.box>=5?'done':''}"><span class="rw">${w.word}</span><span class="rk">${w.meaning}</span><span class="stars" style="color:${s.box>=5?'var(--gold)':'var(--sub)'}">${stars(s.box)}</span></div>`;
  }).join("");
  stage.innerHTML=`<div class="rev-hero">
      <div class="rev-num">${due.length}</div><div class="rev-lbl">今日 復習する単語</div>
      <div class="controls" style="margin-top:16px">
        ${due.length?`<button class="btn good wide" id="startDue">復習をはじめる 📅</button>`:`<button class="btn ghost wide" id="practice">${learned.length?"今は0語。全部を練習する 🔁":"まだ単語を学んでいません"}</button>`}
      </div>
    </div>
    <div class="growstats" style="margin-top:18px">
      <div class="gchip">📚 学習済み <b>${learned.length}</b></div>
      <div class="gchip">⏳ 復習待ち <b>${due.length}</b></div>
      <div class="gchip">👑 完全習得 <b>${mastered.length}</b></div>
    </div>
    ${learned.length?`<div class="sectitle">🗂️ 記録（★5で「完全に覚えた」）</div><div class="recordlist">${recRows}</div>
      ${due.length?`<div class="controls" style="margin-top:6px"><button class="btn ghost wide" id="practice">復習待ちが無くても全部練習する 🔁</button></div>`:""}`
     :`<div class="empty">まず「📖暗記」や「✏️意味」で単語を覚えると、ここに記録が貯まり、最適なタイミングで復習に出てきます。</div>`}`;
  const sd=$("#startDue"); if(sd) sd.onclick=()=>startReview(due);
  const pr=$("#practice"); if(pr&&learned.length) pr.onclick=()=>startReview(learned);
}
function startReview(list){ RQ=shuffle(list); ri=0; renderReviewCard(); }
function renderReviewCard(){
  if(ri>=RQ.length){ const n=RQ.length; RQ=null; toast(`復習完了！ ${n}語チェック ✅`); return renderReview(); }
  bar(ri/RQ.length*100);
  $("#counter").textContent=`復習 ${ri+1} / ${RQ.length}`;
  const w=RQ[ri];
  stage.innerHTML=`<div class="card"><span class="rootchip">📅 復習：意味はどれ？</span>
    <div class="qword">${w.word}</div><div class="qkana">${w.kana}</div>
    <div class="choices" id="ch">${mkChoices(w,"meaning")}</div></div>`;
  answered=false;
  $("#ch").querySelectorAll(".choice").forEach(btn=>{
    btn.onclick=()=>{
      if(answered)return; answered=true;
      const ok=btn.dataset.ok==="true";
      $("#ch").querySelectorAll(".choice").forEach(b=>{ if(b.dataset.ok==="true")b.classList.add("correct"); else b.classList.add("dim"); });
      if(!ok)btn.classList.add("wrong");
      srsAnswer(w.id,ok); bumpStreak();
      if(ok){ST.xp+=8; const s=ST.srs[w.id]; toast(s.box>=5?"完璧！👑 完全習得":"よし、定着中！ +8XP");}
      else{ST.xp+=2; toast("復習で出し直すね 🔁");}
      save(); checkAch(); $("#xp").textContent=ST.xp; $("#streak").textContent=ST.streak;
      ri++; setTimeout(renderReviewCard,1000);
    };
  });
}

/* ============ 設定・バックアップ ============ */
function renderSettings(){
  stage.innerHTML=`<div class="grow" style="align-items:stretch">
    <div class="sectitle">⚙️ 設定・データ管理</div>
    <div class="empty" style="padding:8px 4px;text-align:left;font-size:13px">進捗（XP・覚えた単語・復習記録・実績）は、このスマホのブラウザ内にだけ保存されています。万一に備え、ときどき下のバックアップを取っておくと安心です。</div>
    <div class="sectitle">💾 バックアップ（書き出し）</div>
    <div class="controls"><button class="btn good wide" id="exp">ファイルに書き出す ⬇️</button></div>
    <div class="controls" style="margin-top:8px"><button class="btn ghost wide" id="copy">テキストをコピー 📋</button></div>
    <div class="sectitle">♻️ 復元（読み込み）</div>
    <textarea id="imptext" placeholder="バックアップのテキストをここに貼り付け" style="width:100%;height:74px;border-radius:12px;background:var(--card2);color:var(--text);border:1px solid #343a66;padding:10px;font-size:12px"></textarea>
    <div class="controls" style="margin-top:8px"><button class="btn flip wide" id="imp">テキストから復元</button></div>
    <div class="controls" style="margin-top:8px"><label class="btn ghost wide" style="text-align:center;cursor:pointer;margin:0">ファイルから復元 📁<input type="file" id="impfile" accept="application/json,.json" style="display:none"></label></div>
    <div class="sectitle">⚠️ リセット</div>
    <div class="controls"><button class="btn again wide" id="reset">進捗をすべて消す</button></div>
  </div>`;
  $("#exp").onclick=exportData;
  $("#copy").onclick=()=>{ try{navigator.clipboard.writeText(JSON.stringify(ST)).then(()=>toast("コピーしました 📋"),()=>toast("コピーできませんでした"));}catch(e){toast("コピーできませんでした");} };
  $("#imp").onclick=()=>{ try{ importData(JSON.parse($("#imptext").value)); }catch(e){ toast("読み込めません（形式エラー）"); } };
  $("#impfile").onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ importData(JSON.parse(r.result)); }catch(err){ toast("読み込めません（形式エラー）"); } }; r.readAsText(f); };
  $("#reset").onclick=()=>{ if(confirm("本当に全進捗を消しますか？元に戻せません。")){ localStorage.removeItem("vocab_state"); location.reload(); } };
}
function exportData(){
  const blob=new Blob([JSON.stringify(ST)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`eitango-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast("バックアップを書き出しました ⬇️");
}
function importData(obj){
  if(!obj||typeof obj!=="object") return toast("形式エラー");
  Object.keys(obj).forEach(k=>{ ST[k]=obj[k]; });
  save(); toast("復元しました ✅ 再読み込みします"); setTimeout(()=>location.reload(),900);
}

/* ============ 知恵の樹 ============ */
const TREE_STAGES=["種","芽","若木","成木","開花","結実"];
function treeLevel(xp){ return Math.min(5,Math.floor(xp/100)); }
function drawTree(stage_,fruits,golden){
  const trunkH=[4,18,46,84,108,120][stage_], crown=[0,16,34,58,70,78][stage_];
  const cy=230-trunkH-crown*0.5;
  const lA=golden?"#ffd45b":"#2fd27a",lB=golden?"#e6b73e":"#27b86a",lC=golden?"#ffe488":"#34e07f",tr=golden?"#b8863f":"#9c6b3f";
  let glow=golden?`<circle cx="160" cy="${cy}" r="${crown+18}" fill="#ffd45b" opacity=".18"/>`:"";
  let leaves="";
  if(stage_>=1){ const bl=stage_>=4;
    leaves=`<circle cx="160" cy="${cy}" r="${crown}" fill="${lA}" opacity=".92"/><circle cx="${160-crown*0.6}" cy="${cy+crown*0.3}" r="${crown*0.7}" fill="${lB}" opacity=".92"/><circle cx="${160+crown*0.6}" cy="${cy+crown*0.3}" r="${crown*0.7}" fill="${lC}" opacity=".92"/>`;
    if(bl){for(let k=0;k<6;k++){const a=k/6*6.28;leaves+=`<circle cx="${160+Math.cos(a)*crown*0.7}" cy="${cy+Math.sin(a)*crown*0.7}" r="5" fill="${golden?'#fff3c4':'#ff9ed2'}"/>`;}}
  } else if(stage_===0){ leaves=`<ellipse cx="160" cy="224" rx="13" ry="9" fill="#a9794e"/><path d="M160,216 q-8,-12 0,-18 q8,6 0,18" fill="#34e07f"/>`; }
  else { leaves=`<path d="M160,222 q-14,-20 0,-30 q14,10 0,30" fill="#34e07f"/>`; }
  let fr=""; const cap=stage_>=2?16:0, fn=Math.min(fruits,cap);
  for(let k=0;k<fn;k++){const a=k/Math.max(cap,1)*6.28;fr+=`<circle cx="${160+Math.cos(a)*crown*0.78}" cy="${cy+Math.sin(a)*crown*0.78}" r="6" fill="#ff5b7a" stroke="#c23" stroke-width="1.5"/>`;}
  let cr=golden?`<text x="160" y="${cy-crown-6}" font-size="26" text-anchor="middle">👑</text>`:"";
  return `<svg class="tree" viewBox="0 0 320 260" xmlns="http://www.w3.org/2000/svg"><ellipse cx="160" cy="244" rx="120" ry="14" fill="#1b1f3b"/>${glow}<rect x="152" y="${230-trunkH}" width="16" height="${trunkH}" rx="5" fill="${tr}"/>${leaves}${fr}${cr}</svg>`;
}
function renderGrow(){
  const lv=treeLevel(ST.xp),fruits=mc(),gold=isGolden();
  const nextXP=(lv+1)*100,prog=lv>=5?100:((ST.xp-lv*100)/100*100);
  const unlocked=ACH.filter(a=>ST.ach[a.id]).length;
  const badges=ACH.map(a=>{const on=!!ST.ach[a.id];return `<div class="badge ${on?'on':'off'}"><div class="bi">${on?a.icon:'🔒'}</div><div class="bn">${a.name}</div><div class="bd">${a.desc}</div></div>`;}).join("");
  stage.innerHTML=`<div class="grow">${drawTree(lv,fruits,gold)}
    <h2>知恵の樹：<span class="lv">${gold?'黄金樹 👑':TREE_STAGES[lv]}</span></h2>
    <div class="sub">${gold?"全実績コンプ！最強の知恵の樹です✨":(lv>=5?"最大まで育ちました！実を増やそう🍎":`次の成長まで あと ${nextXP-ST.xp} XP`)}</div>
    <div class="growbar"><div style="width:${prog}%"></div></div>
    <div class="growstats"><div class="gchip">⭐ XP <b>${ST.xp}</b></div><div class="gchip">🍎 単語 <b>${fruits}</b></div><div class="gchip">🔥 連続 <b>${ST.streak}</b>日</div><div class="gchip">🏆 実績 <b>${unlocked}/${ACH.length}</b></div></div>
    <div class="achtitle">🏆 実績 <span>${unlocked} / ${ACH.length} 解除</span></div>
    <div class="badges">${badges}</div></div>`;
}

/* ============ 初期化・イベント ============ */
const _opt=d=>`<option value="${d.id}">${d.name}</option>`;
$("#deck").innerHTML=
  `<optgroup label="📚 基礎（100語ごと）">${LEVEL_DECKS.map(_opt).join("")}</optgroup>`+
  `<optgroup label="🧩 語源で覚える（${GROUP_DECKS.length}）">${GROUP_DECKS.map(_opt).join("")}</optgroup>`;
$("#deck").onchange=e=>{ deck=e.target.value; RQ=null; startSession(); render(); };
$("#order").value=ST.order;
$("#order").onchange=e=>{ ST.order=e.target.value; save(); startSession(); render(); };
const APP_VER="2026-06-22d";
$("#wc").textContent=WORDS.length; $("#ver").textContent=APP_VER;
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
document.querySelectorAll(".tab").forEach(t=>{ t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active")); t.classList.add("active");
  mode=t.dataset.mode; RQ=null; startSession(); render(); };
});
startSession(); render();
</script>
